# Civic-Link DPI - Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.production up -d
# All environment variables must reference .env.production — no hardcoded values.

services:
  # ------------------------------------------------------------------
  # Database Migration Service (runs once before API starts)
  # ------------------------------------------------------------------
  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civic_migrations_prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - civic_network
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  # ------------------------------------------------------------------
  # PostgreSQL (internal only — no exposed ports)
  # ------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: civic_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civic_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  # ------------------------------------------------------------------
  # Redis (internal only — no exposed ports)
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: civic_redis_prod
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civic_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  # ------------------------------------------------------------------
  # FastAPI API (production — no hot reload, no source mounts)
  # ------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civic_api_prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      AUDIT_LOG_ENCRYPTION_KEY: ${AUDIT_LOG_ENCRYPTION_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - civic_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  # ------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: civic_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # TLS certificates (uncomment when configured):
      # - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - civic_network
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  civic_network:
    driver: bridge
