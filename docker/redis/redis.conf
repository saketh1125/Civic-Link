# Civic-Link DPI Redis Configuration
# Optimized for commute offer caching and session management

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory Management
# Set max memory to prevent OOM in containerized environments
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence
# RDB snapshots every 15 minutes if at least 1 key changed
save 900 1
save 300 10
save 60 10000

# Enable AOF for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Logging
loglevel notice

# Client Output Buffer Limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Timeouts
timeout 300
tcp-keepalive 300

# Security (use AUTH in production)
# requirepass will be set via environment variable

# Performance
databases 16
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no
lazyfree-lazy-user-del no

# Event Notifications for cache invalidation
notify-keyspace-events Ex
