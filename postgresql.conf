# Civic-Link DPI PostgreSQL Configuration
# Optimized for PostGIS and high-concurrency geospatial queries

# Connection Settings
listen_addresses = '*'
max_connections = 200
shared_buffers = 256MB
effective_cache_size = 768MB
maintenance_work_mem = 64MB
work_mem = 4MB

# Geospatial Optimizations
# Enable parallel query execution for large spatial operations
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_worker_processes = 8

# WAL Settings for better write performance
wal_buffers = 16MB
checkpoint_completion_target = 0.9
random_page_cost = 1.1
effective_io_concurrency = 200

# Query Planning
default_statistics_target = 100

# Logging - Production should use structured logging
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000  -- Log slow queries (>1s)
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# Locale and Formatting
datestyle = 'iso, mdy'
timezone = 'UTC'

# PostGIS-specific: Enable geometry validation
# (handled in application layer for Geography types)
