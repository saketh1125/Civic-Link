# Civic-Link DPI - Production Nginx Configuration
# Reverse proxy for FastAPI backend (upstream: api:8000)

upstream api_backend {
    server api:8000;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client body size limit
    client_max_body_size 10m;

    # Gzip compression for JSON responses
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 256;
    gzip_vary on;

    # Proxy default settings
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Health check — bypass rate limiting, return 200 directly
    location /health {
        access_log off;
        proxy_pass http://api_backend/health;
    }

    # Auth endpoints — stricter rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
    }

    # All other API routes
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;

        proxy_pass http://api_backend;
    }

    # Default location
    location / {
        proxy_pass http://api_backend;
    }

    # =================================================================
    # TLS Configuration (commented — uncomment and update paths for production)
    # =================================================================
    # listen 443 ssl http2;
    #
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;
