version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: civic_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-civic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-civic_secret}
      POSTGRES_DB: ${POSTGRES_DB:-civic_link}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-civic} -d ${POSTGRES_DB:-civic_link}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civic_network

  redis:
    image: redis:7-alpine
    container_name: civic_redis
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - civic_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civic_api
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-civic}:${POSTGRES_PASSWORD:-civic_secret}@postgres:5432/${POSTGRES_DB:-civic_link}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-civic-development-secret-key-change-in-production}
      DEBUG: ${DEBUG:-true}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      POSTGIS_SRID: 4326
      DEFAULT_SEARCH_RADIUS: 500
      COMMUTE_CACHE_TTL: 900
      AUDIT_LOG_ENCRYPTION_KEY: ${AUDIT_LOG_ENCRYPTION_KEY}
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - civic_network
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civic_migrations
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-civic}:${POSTGRES_PASSWORD:-civic_secret}@postgres:5432/${POSTGRES_DB:-civic_link}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - civic_network
    command: ["alembic", "upgrade", "head"]
    profiles:
      - migrations

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  civic_network:
    driver: bridge
